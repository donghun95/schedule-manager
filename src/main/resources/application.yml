spring:
  application:
    name: schedule-manager

  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:schedule_manager}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
    show-sql: true
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  session:
    timeout: 30m
    data:
      redis:
        namespace: schedule-manager:session

server:
  port: 18080
  servlet:
    session:
      cookie:
        name: SCHEDULEID
        http-only: true
        secure: false # 로컬 개발에서는 false, 배포 환경에서는 true
        same-site: lax

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger - %msg%n"
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG